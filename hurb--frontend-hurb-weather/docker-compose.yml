services:
  # ==========================================
  # Serviço de desenvolvimento
  # ==========================================
  app-dev:
    build:
      context: .
      target: development
    container_name: hurb-weather-dev
    profiles: [dev]
    ports:
      - '3000:3000'
    volumes:
      # Hot reload: sincronizar código fonte
      - .:/app
      # Não sincronizar node_modules
      - /app/node_modules
      # Não sincronizar .next
      - /app/.next
    environment:
      - NODE_ENV=development
    env_file:
      - .env.local
    stdin_open: true
    tty: true

  # ==========================================
  # Serviço de produção
  # ==========================================
  app-prod:
    build:
      context: .
      target: production
    container_name: hurb-weather-prod
    profiles: [prod]
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
    env_file:
      - .env.local
    restart: unless-stopped
